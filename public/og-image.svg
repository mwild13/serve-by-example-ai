<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f5f2e9"/>

  <!-- Decorative top bar -->
  <rect width="1200" height="6" fill="#1f4e37"/>

  <!-- Gold eyebrow label -->
  <rect x="480" y="140" width="240" height="38" rx="19" fill="#a9812a"/>
  <text x="600" y="165" font-family="Georgia, serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle" letter-spacing="2">AI-POWERED TRAINING</text>

  <!-- Main headline -->
  <text x="600" y="270" font-family="Georgia, serif" font-size="64" font-weight="800" fill="#0f2d1d" text-anchor="middle">Serve By Example AI</text>

  <!-- Sub-headline line 1 -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="28" fill="#496155" text-anchor="middle">Train bartenders and venue teams faster</text>
  <!-- Sub-headline line 2 -->
